<div class="auth-card">
  <div class="auth-header">
    <div class="cyber-badge">SYSTEM SECURITY</div>
    <h2>CYBER<span>VAULT</span></h2>
    <p>Kho lưu trữ mật khẩu mã hóa chuẩn KeePass KDBX</p>
  </div>

  <!-- Auth Tab Navigation -->
  <div class="tab-switcher">
    <button id="tabLogin" class="tab-btn active">ĐĂNG NHẬP</button>
    <button id="tabRegister" class="tab-btn">ĐĂNG KÝ MỚI</button>
  </div>

  <!-- Login Form -->
  <form id="loginForm" class="auth-form" autocomplete="off" data-lpignore="true" data-bwignore="true" data-1p-ignore="true">
    <div class="form-group">
      <label for="loginUsername">Tên tài khoản</label>
      <input type="text" id="loginUsername" class="cyber-input" placeholder="Nhập username..." required autocomplete="off">
    </div>
    <div class="form-group">
      <label for="loginPassword">Mật khẩu chính (Master Password)</label>
      <input type="password" id="loginPassword" class="cyber-input" placeholder="Mật khẩu giải mã .kdbx..." required autocomplete="off">
    </div>
    <button type="submit" class="cyber-btn">
      <span>MỞ KHO BẢO MẬT KDBX</span>
    </button>
  </form>

  <!-- Register Form -->
  <form id="registerForm" class="auth-form hidden" autocomplete="off" data-lpignore="true" data-bwignore="true" data-1p-ignore="true">
    <div class="form-group">
      <label for="regUsername">Tên tài khoản mới</label>
      <input type="text" id="regUsername" class="cyber-input" placeholder="Đặt username cá nhân..." required autocomplete="off">
      <div id="regUsernameHint" class="username-hint" style="font-family:var(--font-mono); font-size:0.75rem; margin-top:0.35rem; display:none;"></div>
    </div>
    <div class="form-group">
      <label for="regPassword">Mật khẩu kho mới</label>
      <input type="password" id="regPassword" class="cyber-input" placeholder="Mật khẩu giải mã .kdbx..." required autocomplete="off">
    </div>
    <button type="submit" id="btnSubmitRegister" class="cyber-btn">
      <span>KÍCH HOẠT KHO MỚI (.KDBX)</span>
    </button>
  </form>
</div>
